<svg width="680" height="640" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: #fff;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; fill: #2c2c2a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; fill: #5f5e5a; }
      .pill-gray  { fill: #f1efe8; stroke: #888780; }
      .pill-purple{ fill: #eeedfe; stroke: #534ab7; }
      .pill-blue  { fill: #e6f1fb; stroke: #185fa5; }
      .pill-amber { fill: #faeeda; stroke: #854f0b; }
      .pill-teal  { fill: #e1f5ee; stroke: #0f6e56; }
      .th-gray    { fill: #444441; }
      .th-purple  { fill: #3c3489; }
      .th-blue    { fill: #0c447c; }
      .th-amber   { fill: #633806; }
      .th-teal    { fill: #085041; }
      .ts-purple  { fill: #534ab7; font-size: 12px; }
      .ts-blue    { fill: #185fa5; font-size: 12px; }
      .ts-amber   { fill: #854f0b; font-size: 12px; }
      .ts-teal    { fill: #0f6e56; font-size: 12px; }
      .arr        { stroke: #888780; stroke-width: 1.5; fill: none; }
      .dash       { stroke: #b4b2a9; stroke-width: 1; fill: none; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <!-- START -->
  <rect x="215" y="28" width="250" height="44" rx="22" class="pill-gray" stroke-width="0.5"/>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central" class="th th-gray">user-sync [flags]</text>

  <line x1="340" y1="72" x2="340" y2="106" class="arr" marker-end="url(#arrow)"/>

  <!-- PARSE -->
  <rect x="195" y="106" width="290" height="56" rx="8" class="pill-purple" stroke-width="0.5"/>
  <text x="340" y="126" text-anchor="middle" dominant-baseline="central" class="th th-purple">Parse CLI args + env vars</text>
  <text x="340" y="146" text-anchor="middle" dominant-baseline="central" class="ts-purple">--start, --end, --realm, --dry-run …</text>

  <line x1="340" y1="162" x2="340" y2="196" class="arr" marker-end="url(#arrow)"/>

  <!-- CONNECT -->
  <rect x="195" y="196" width="290" height="56" rx="8" class="pill-purple" stroke-width="0.5"/>
  <text x="340" y="216" text-anchor="middle" dominant-baseline="central" class="th th-purple">Connect: DB + OAuth2 token</text>
  <text x="340" y="236" text-anchor="middle" dominant-baseline="central" class="ts-purple">fail fast if either unreachable</text>

  <line x1="340" y1="252" x2="340" y2="286" class="arr" marker-end="url(#arrow)"/>

  <!-- LOOP container -->
  <rect x="80" y="286" width="520" height="202" rx="10" fill="none" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="5 4"/>
  <text x="92" y="302" dominant-baseline="central" class="ts">&#8635; per interval chunk</text>

  <!-- FETCH -->
  <rect x="195" y="308" width="290" height="56" rx="8" class="pill-blue" stroke-width="0.5"/>
  <text x="340" y="328" text-anchor="middle" dominant-baseline="central" class="th th-blue">Fetch users (retry × 5)</text>
  <text x="340" y="348" text-anchor="middle" dominant-baseline="central" class="ts-blue">exponential backoff, token auto-refresh</text>

  <line x1="340" y1="364" x2="340" y2="398" class="arr" marker-end="url(#arrow)"/>

  <!-- DRY-RUN decision -->
  <rect x="248" y="398" width="184" height="44" rx="8" class="pill-amber" stroke-width="0.5"/>
  <text x="340" y="414" text-anchor="middle" dominant-baseline="central" class="th th-amber">--dry-run?</text>
  <text x="340" y="431" text-anchor="middle" dominant-baseline="central" class="ts-amber">skip writes, print only</text>

  <!-- Yes branch -->
  <line x1="248" y1="420" x2="148" y2="420" class="arr" stroke="#888780" marker-end="url(#arrow)"/>
  <rect x="86" y="398" width="62" height="44" rx="8" class="pill-teal" stroke-width="0.5"/>
  <text x="117" y="414" text-anchor="middle" dominant-baseline="central" class="th th-teal">Yes</text>
  <text x="117" y="431" text-anchor="middle" dominant-baseline="central" class="ts-teal">log only</text>

  <!-- dry-run rejoins loop bottom -->
  <path d="M86 442 L86 514 L195 514" class="dash"/>

  <!-- No branch -->
  <line x1="340" y1="442" x2="340" y2="470" class="arr" marker-end="url(#arrow)" stroke="#888780"/>
  <text x="350" y="459" dominant-baseline="central" class="ts">No</text>

  <!-- UPSERT -->
  <rect x="195" y="470" width="290" height="44" rx="8" class="pill-teal" stroke-width="0.5"/>
  <text x="340" y="492" text-anchor="middle" dominant-baseline="central" class="th th-teal">Upsert to DB + sleep 60s</text>

  <!-- loop-back -->
  <path d="M485 492 L600 492 L600 317 L485 317" class="dash" marker-end="url(#arrow)"/>

  <!-- exit loop -->
  <line x1="340" y1="488" x2="340" y2="532" class="arr" stroke="#b4b2a9" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="352" y="516" dominant-baseline="central" class="ts">all chunks done</text>

  <!-- SYNC SQL -->
  <rect x="195" y="532" width="290" height="44" rx="8" class="pill-purple" stroke-width="0.5"/>
  <text x="340" y="554" text-anchor="middle" dominant-baseline="central" class="th th-purple">Run --sync-sql (if set)</text>

  <line x1="340" y1="576" x2="340" y2="604" class="arr" marker-end="url(#arrow)"/>

  <!-- EXIT -->
  <rect x="215" y="604" width="250" height="30" rx="15" class="pill-gray" stroke-width="0.5"/>
  <text x="340" y="619" text-anchor="middle" dominant-baseline="central" class="th th-gray">exit 0 (or 1 on error)</text>
</svg>
